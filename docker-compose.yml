services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ekalya-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: ekalya-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
